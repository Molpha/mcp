name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # changesets pushes version commits and creates GitHub releases
      pull-requests: write # changesets opens/updates the "Version Packages" PR
      id-token: write # npm trusted publishing + mcp-publisher github-oidc

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # npm >=11.5.1 is required for OIDC trusted publishing; pin explicitly
      # rather than relying on whatever setup-node's Node 24 bundles.
      - name: Update npm for trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Version Packages PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run ci:version
          publish: npm run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mcp-publisher
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -euo pipefail
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar xzf mcp-publisher.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          rm mcp-publisher.tar.gz

      - name: Publish to the MCP registry
        if: steps.changesets.outputs.published == 'true'
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
